theory:
  isitide.isitIDE:
    version: 1.6.1
    path: /work/nxk230035/isitIDE/
    speed: 0.3
    stop_at_error: false
    extra_args:
      AccuracyBoost: 1
      bbn_predictor: PArthENoPE_880.2_standard.dat
      halofit_version: mead2020
      lAccuracyBoost: 1
      lSampleBoost: 1
      lens_margin: 1250
      lens_potential_accuracy: 4
      lmax: 6000
      mnu: 0.06
      nnu: 3.044
      num_massive_neutrinos: 3
      neutrino_hierarchy: degenerate
      dark_energy_model: IDEModel1
      theta_H0_range:
      - 20
      - 100
    ignore_obsolete: false
    use_renames: false
    external_primordial_pk: false
    renames:
      omegabh2: ombh2
      omegach2: omch2
      omegal: omega_de
      omegak: omk
      yhe: YHe
      yheused: YHe
      YpBBN: Y_p
    input_params:
    - ns
    - As
    - H0
    - tau
    - ombh2
    - omch2
    - beta
    output_params:
    - omegam
    - omegal
    - YHe
    - zrei
    - sigma8
    - age
    - rdrag
    - thetastar
    - zstar
    - rstar
    - DAstar
    - zdrag
    - zeq
    - keq
    - Y_p
    - kd
    - thetad
    - thetaeq
    - thetarseq
    - DH
likelihood:
  planck_2018_lowl.TT:
    lmin: 2
    lmax: 29
    type: CMB
    aliases:
    - lowT
    speed: -1
    stop_at_error: false
    version: null
    input_params:
    - A_planck
    output_params: []
  act_dr6_cmbonly.PlanckActCut:
    path: null
    dataset_file: plik_lite_v22.dataset
    dataset_params:
      use_cl: tt te ee
      lmin_cuts: 0 0 0
      lmax_cuts: 1000 600 600
    aliases:
    - plikHM_TTTEEE
    speed: 200
    type: CMB
    stop_at_error: false
    version: null
    package_install:
      github_repository: ACTCollaboration/DR6-ACT-lite
    input_params:
    - A_planck
    output_params: []
  act_dr6_cmbonly.ACTDR6CMBonly:
    url: https://lambda.gsfc.nasa.gov/data/act/pspipe/sacc_files/
    input_file: dr6_data_cmbonly.fits
    data_folder: ACTDR6CMBonly
    version: v1.0
    ell_cuts:
      TT:
      - 600
      - 8500
      TE:
      - 600
      - 8500
      EE:
      - 600
      - 8500
    lmax_theory: 9000
    type: []
    speed: -1
    stop_at_error: true
    input_params:
    - A_act
    - P_act
    output_params: []
  act_dr6_lenslike.ACTDR6LensLike:
    lmax: 4000
    mock: false
    nsims_act: 792.0
    nsims_planck: 400.0
    no_like_corrections: false
    no_actlike_cmb_corrections: false
    lens_only: false
    trim_lmax: 2998
    variant: actplanck_baseline
    apply_hartlap: true
    limber: false
    nz: 100
    kmax: 10
    zmax: null
    scale_cov: null
    varying_cmb_alens: false
    version: null
    act_cmb_rescale: false
    act_calib: false
    type: []
    speed: -1
    stop_at_error: true
    package_install:
      github_repository: ACTCollaboration/act_dr6_lenslike
    input_params: []
    output_params: []
  spt3g_d1_tne:
    data_set_file: spt_candl_data.SPT3G_D1_TnE
    variant: lite
    clear_internal_priors: true
    clear_specific_priors: []
    lensing: false
    add_logdet: false
    feedback: true
    data_selection: true
    wrapper: null
    additional_args: null
    type: []
    speed: -1
    stop_at_error: false
    version: null
    package_install:
      github_repository: SouthPoleTelescope/spt_candl_data
    class: candl.interface.CandlCobayaLikelihood
    input_params:
    - tau
    - Tcal
    - Ecal
    output_params: []
  muse3glike.cobaya.spt3g_2yr_delensed_ee_optimal_pp_muse:
    components:
    - ϕϕ
    filename: null
    type: []
    speed: -1
    stop_at_error: false
    version: null
    package_install:
      download_url: https://pole.uchicago.edu/public/data/ge25/muse_3g_like_march_2025.zip
    input_params: []
    output_params: []
params:
  logA:
    prior:
      min: 1.61
      max: 3.91
    ref:
      dist: norm
      loc: 3.05
      scale: 0.001
    proposal: 0.001
    latex: \log(10^{10} A_\mathrm{s})
    drop: true
  ns:
    prior:
      min: 0.8
      max: 1.2
    ref:
      dist: norm
      loc: 0.965
      scale: 0.004
    proposal: 0.002
    latex: n_\mathrm{s}
  H0:
    prior:
      min: 40
      max: 100
    ref:
      dist: norm
      loc: 67
      scale: 2
    proposal: 2
    latex: H_0
  tau:
    prior:
      dist: norm
      loc: 0.051
      scale: 0.006
    ref: 0.051
    proposal: 0.003
    latex: \tau_\mathrm{reio}
  ombh2:
    prior:
      min: 0.005
      max: 0.1
    ref:
      dist: norm
      loc: 0.0224
      scale: 0.0001
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
    renames:
    - omegabh2
  omch2:
    prior:
      min: 0.001
      max: 0.99
    ref:
      dist: norm
      loc: 0.12
      scale: 0.001
    proposal: 0.0005
    latex: \Omega_\mathrm{c} h^2
    renames:
    - omegach2
  Tcal:
    latex: T_{\rm cal}
    prior:
      dist: norm
      loc: 1.0
      scale: 0.0036
    ref: 1.0
  Ecal:
    latex: E_{\rm cal}
    prior:
      max: 1.2
      min: 0.8
    ref: 1.0
  beta:
    prior:
      min: -1.0
      max: 1.0
    ref:
      dist: norm
      loc: 0.1
      scale: 0.02
    proposal: 0.02
    latex: \beta
  omegam:
    latex: \Omega_\mathrm{m}
    derived: true
  omegamh2:
    derived: 'lambda omegam, H0: omegam*(H0/100)**2'
    latex: \Omega_\mathrm{m} h^2
  omegal:
    latex: \Omega_\Lambda
    derived: true
    renames:
    - omega_de
  As:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    derived: true
    latex: A_\mathrm{s}
  YHe:
    latex: Y_\mathrm{P}
    derived: true
    renames:
    - yhe
    - yheused
  zrei:
    latex: z_\mathrm{re}
    derived: true
  sigma8:
    latex: \sigma_8
    derived: true
  s8h5:
    derived: 'lambda sigma8, H0: sigma8*(H0*1e-2)**(-0.5)'
    latex: \sigma_8/h^{0.5}
  s8omegamp5:
    derived: 'lambda sigma8, omegam: sigma8*omegam**0.5'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.5}
  s8omegamp25:
    derived: 'lambda sigma8, omegam: sigma8*omegam**0.25'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.25}
  A:
    derived: 'lambda As: 1e9*As'
    latex: 10^9 A_\mathrm{s}
  clamp:
    derived: 'lambda As, tau: 1e9*As*np.exp(-2*tau)'
    latex: 10^9 A_\mathrm{s} e^{-2\tau}
  age:
    latex: '{\rm{Age}}/\mathrm{Gyr}'
    derived: true
  rdrag:
    latex: r_\mathrm{drag}
    derived: true
  thetastar:
    latex: 100\theta_\star
    derived: true
  zstar:
    latex: z_\star
    derived: true
  rstar:
    latex: r_\star
    derived: true
  DAstar:
    latex: D_A(z_\star)
    derived: true
  zdrag:
    latex: z_\mathrm{d}
    derived: true
  zeq:
    latex: z_\mathrm{eq}
    derived: true
  keq:
    latex: k_\mathrm{eq}
    derived: true
  S8:
    derived: ' lambda sigma8, omegam: sigma8*(omegam/0.3)**0.5'
    latex: S_8
  Y_p:
    latex: Y_P^\mathrm{BBN}
    derived: true
    renames:
    - YpBBN
  omegamh3:
    derived: 'lambda omegam, H0: omegam*(H0/100)**3'
    latex: \Omega_\mathrm{m} h^3
  rdh:
    derived: 'lambda rdrag, H0: rdrag*(H0/100)'
    latex: r_\mathrm{drag} h
  DHBBN:
    derived: 'lambda DH: 10**5*DH'
    latex: 10^5 \mathrm{D}/\mathrm{H}
  kd:
    latex: k_D
    derived: true
  thetad:
    latex: 100\theta_D
    derived: true
  thetaeq:
    latex: 100\theta_\mathrm{eq}
    derived: true
  thetarseq:
    latex: 100\theta_{\mathrm{s,eq}
    derived: true
  A_planck:
    prior:
      min: 0.5
      max: 1.5
    ref:
      dist: norm
      loc: 1.0
      scale: 0.1
    latex: A_{\rm planck}
    proposal: 0.003
  A_act:
    value: 'lambda A_planck: A_planck'
    latex: A_{\rm ACT}
    derived: true
  P_act:
    prior:
      min: 0.9
      max: 1.1
    ref:
      dist: norm
      loc: 1.0
      scale: 0.01
    proposal: 0.01
    latex: p_{\rm ACT}
  chi2__CMB:
    latex: \chi^2_\mathrm{CMB}
    derived: true
sampler:
  mcmc:
    burn_in: 0
    max_tries: 40d
    covmat: auto
    covmat_params: null
    proposal_scale: 1.9
    output_every: 60s
    learn_every: 40d
    temperature: 1
    learn_proposal: true
    learn_proposal_Rminus1_max: 2.0
    learn_proposal_Rminus1_max_early: 30.0
    learn_proposal_Rminus1_min: 0.0
    max_samples: .inf
    Rminus1_stop: 0.02
    Rminus1_cl_stop: 0.2
    Rminus1_cl_level: 0.95
    Rminus1_single_split: 4
    measure_speeds: true
    oversample_power: 0.4
    oversample_thin: true
    drag: true
    blocking: null
    callback_function: null
    callback_every: null
    seed: null
    check_every: null
    oversample: null
    drag_limits: null
    fallback_covmat_scale: 4
    version: null
output: chains
test: true
version: 3.5.7
